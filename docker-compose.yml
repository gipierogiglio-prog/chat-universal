services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
      POSTGRES_DB: chat_universal
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host port 5433 to avoid clashing with a local PostgreSQL on 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat_universal"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chat:${POSTGRES_PASSWORD:-chat}@db:5432/chat_universal?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HERMES_API_KEY: ${HERMES_API_KEY:-hermes-secret-key}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-openclaw-secret-key}
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"

volumes:
  pgdata:
  uploads:
